services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: puja-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-puja_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-puja_planner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - puja-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puja_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: puja-backend
    ports:
      - "8735:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://puja_user:puja_password@postgres:5432/puja_planner}
      SERPER_API_KEY: ${SERPER_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8734,http://localhost:5173}
      CACHE_EXPIRY_HOURS: ${CACHE_EXPIRY_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - puja-network
    restart: unless-stopped

  # Vite/React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8735}
    container_name: puja-frontend
    ports:
      - "8734:80"
    depends_on:
      - backend
    networks:
      - puja-network
    restart: unless-stopped

networks:
  puja-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
