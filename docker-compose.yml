services:
  # PostgreSQL Database
  puja_db_service:
    image: postgres:15-alpine
    container_name: puja_db_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data_v4/pgdata
    volumes:
      - puja_db_v4:/var/lib/postgresql/data_v4
    networks:
      - puja-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puja_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: puja-backend
    ports:
      - "8735:8735"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: ${DB_HOST}
      SERPER_API_KEY: ${SERPER_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CACHE_EXPIRY_HOURS: ${CACHE_EXPIRY_HOURS:-24}
    depends_on:
      puja_db_service:
        condition: service_healthy
    networks:
      - puja-network
      - coolify
      - wkkkc44k0wkw4g04c0ck8skg
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.http.services.puja-backend.loadbalancer.server.port=8735"
    restart: unless-stopped

  # Vite/React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8735}
    container_name: puja-frontend
    ports:
      - "8734:8734"
    depends_on:
      - backend
    networks:
      - puja-network
      - coolify
      - wkkkc44k0wkw4g04c0ck8skg
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.puja-frontend.rule=Host(`puja.fossone.app`)"
      - "traefik.http.services.puja-frontend.loadbalancer.server.port=8734"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8734" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  puja-network:
    external: true
    name: wkkkc44k0wkw4g04c0ck8skg_puja-network
  coolify:
    external: true
  wkkkc44k0wkw4g04c0ck8skg:
    external: true

volumes:
  puja_db_v4:
    driver: local
