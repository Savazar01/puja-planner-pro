services:
  # PostgreSQL Database
  savaz_db:
    image: pgvector/pgvector:pg17
    container_name: savaz_db_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./init-vector.sql:/docker-entrypoint-initdb.d/init-vector.sql
      - savaz_db_vector_data:/var/lib/postgresql/data
    networks:
      - default
      - savaz-prod-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savaz_backend_container
    ports:
      - "${BACKEND_PORT:-8735}:${BACKEND_PORT:-8735}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: ${DB_HOST}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@savaz_db:5432/${POSTGRES_DB}
      SERPER_API_KEY: ${SERPER_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CACHE_EXPIRY_HOURS: ${CACHE_EXPIRY_HOURS:-24}
    depends_on:
      savaz_db:
        condition: service_healthy
    networks:
      - default
      - savaz-prod-net
    restart: unless-stopped

  # Vite/React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8735}
    container_name: savaz_frontend_container
    ports:
      - "${FRONTEND_PORT:-8734}:${FRONTEND_PORT:-8734}"
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-8734}
    depends_on:
      - backend
    networks:
      - savaz-prod-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${FRONTEND_PORT:-8734}" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "8739:6379"
    volumes:
      - savaz_redis_data:/data
    networks:
      - savaz-prod-net

  ollama-api:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "8738:11434"
    volumes:
      - savaz_ollama_storage:/root/.ollama
    networks:
      - savaz-prod-net
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS="*"
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 5s
      timeout: 30s
      retries: 10
    # Note: Add GPU deploy resources here if using ollama-gpu profile

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      ollama-api:
        condition: service_healthy
    ports:
      - "8737:8080"
    volumes:
      - savaz_open_webui_data:/app/backend/data
    networks:
      - savaz-prod-net
    environment:
      - OLLAMA_BASE_URL=http://ollama-api:11434
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8080" ]
      interval: 5s
      timeout: 30s
      retries: 10

  privacy-gate:
    build:
      context: ./services/privacy-gate
    container_name: privacy-gate
    restart: unless-stopped
    ports:
      - "8740:8740"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama-api:11434}
      - AGENT_PLANNER_LLM=${AGENT_PLANNER_LLM:-local}
      - AGENT_FINDER_LLM=${AGENT_FINDER_LLM:-local}
      - AGENT_CONCIERGE_LLM=${AGENT_CONCIERGE_LLM:-local}
      - AGENT_SCRIBE_LLM=${AGENT_SCRIBE_LLM:-local}
      - AGENT_SUPPLIES_LLM=${AGENT_SUPPLIES_LLM:-local}
    networks:
      - savaz-prod-net

networks:
  savaz-prod-net:
    driver: bridge
  default:
    driver: bridge

volumes:
  savaz_db_vector_data:
    driver: local
  savaz_redis_data:
  savaz_ollama_storage:
  savaz_open_webui_data:
