services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: puja-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-puja_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-puja_planner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - puja-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puja_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: puja-backend
    ports:
      - "8735:8735"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SERPER_API_KEY: ${SERPER_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CACHE_EXPIRY_HOURS: ${CACHE_EXPIRY_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - puja-network
      - coolify
      - wkkkc44k0wkw4g04c0ck8skg
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.http.services.puja-backend.loadbalancer.server.port=8735"
    restart: unless-stopped

  # Vite/React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8735}
    container_name: puja-frontend
    ports:
      - "8734:8734"
    depends_on:
      - backend
    networks:
      - puja-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8734" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  puja-network:
    external: true
    name: wkkkc44k0wkw4g04c0ck8skg_puja-network
  coolify:
    external: true
  wkkkc44k0wkw4g04c0ck8skg:
    external: true

volumes:
  postgres_data:
    driver: local
