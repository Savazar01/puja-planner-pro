services:
  # PostgreSQL Database
  savaz_db:
    image: postgres:15-alpine
    container_name: savaz_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - savaz_db_data:/var/lib/postgresql/data
    networks:
      - savaz-prod-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savaz_backend_container
    ports:
      - "8735:8735"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      DB_HOST: ${DB_HOST}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@savaz_db_container:5432/postgres
      SERPER_API_KEY: ${SERPER_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CACHE_EXPIRY_HOURS: ${CACHE_EXPIRY_HOURS:-24}
    depends_on:
      savaz_db:
        condition: service_healthy
    networks:
      - savaz-prod-net
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.http.services.puja-backend.loadbalancer.server.port=8735"
    restart: unless-stopped

  # Vite/React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8735}
    container_name: savaz_frontend_container
    ports:
      - "8734:8734"
    depends_on:
      - backend
    networks:
      - savaz-prod-net
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.puja-frontend.rule=Host(`puja.fossone.app`)"
      - "traefik.http.services.puja-frontend.loadbalancer.server.port=8734"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8734" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  savaz-prod-net:
    external: true

volumes:
  savaz_db_data:
    driver: local
