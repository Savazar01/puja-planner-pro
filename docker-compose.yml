services:
  # PostgreSQL Database
  savaz_db:
    image: pgvector/pgvector:pg17
    container_name: savaz_db_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./init-vector.sql:/docker-entrypoint-initdb.d/init-vector.sql
      - savaz_db_vector_data:/var/lib/postgresql/data
    networks:
      - default
      - savaz-prod-net
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savaz_backend_container
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: ${DB_HOST}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@savaz_db:5432/${POSTGRES_DB}
      SERPER_API_KEY: ${SERPER_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CACHE_EXPIRY_HOURS: ${CACHE_EXPIRY_HOURS:-24}
    depends_on:
      savaz_db:
        condition: service_healthy
    networks:
      - default
      - savaz-prod-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8735/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Vite/React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8735}
    container_name: savaz_frontend_container
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-8734}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - savaz-prod-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${FRONTEND_PORT:-8734}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "8739:6379"
    volumes:
      - savaz_redis_data:/data
    networks:
      - savaz-prod-net

  privacy-gate:
    build:
      context: ./services/privacy-gate
    container_name: privacy-gate
    restart: unless-stopped
    ports:
      - "8740:8740"
    environment:
      - PORT=8740
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - savaz-prod-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8740/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  savaz-prod-net:
    driver: bridge
  default:
    driver: bridge

volumes:
  savaz_db_vector_data:
    driver: local
  savaz_redis_data:
